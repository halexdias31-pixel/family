<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>@family.</title>
  <link rel="stylesheet" href="style.css">
</head>
<body>
  <div id="loader" class="loader">
    <h1 class="pulse">@family.</h1>
    <p class="muted">Syncing...</p>
  </div>

  <header><h1>@family.</h1></header>

  <main>
    <section id="login-section">
      <h2>Portal Access</h2>
      <div class="grid">
        <div class="card">
          <h3 class="gold mb-md">Login</h3>
          <div class="checkout stack">
            <input type="text" id="auth-email" placeholder="Full Name">
            <input type="password" id="auth-pin" placeholder="PIN">
            <button id="auth-btn" class="action">Enter</button>
          </div>
          <p id="auth-msg" class="err mt-sm"></p>
        </div>
      </div>
    </section>

    <section id="dashboard-section" class="hidden">
      <h2 id="dash-greeting" class="gold">Welcome</h2>
      <div id="dash-content" class="grid"></div>
      <button id="logout-btn" class="ghost mt-lg">Log Out</button>
    </section>

    <section>
      <h2>Showcase</h2>
      <div class="filters" id="post-filters"></div>
      <div id="gallery" class="grid"><p class="loader-text">Loading showcase...</p></div>
    </section>

    <section>
      <h2>Open Classes</h2>
      <div class="filters" id="class-filters"></div>
      <div id="classes" class="grid"><p class="muted">Loading...</p></div>
    </section>

    <section>
      <h2>Venues</h2>
      <div class="filters" id="venue-filters"></div>
      <div id="venues" class="grid"><p class="muted">Loading...</p></div>
    </section>

    <section>
      <h2>People</h2>
      <div class="filters" id="tutor-filters"></div>
      <div id="tutors" class="grid"><p class="muted">Loading...</p></div>
    </section>

    <section id="checklist-section">
      <h2>Maths Checklist</h2>
      <div id="checklist-content" class="grid"><p class="muted">Log in as a student to track your topics.</p></div>
    </section>

    <section id="arcade-section">
      <h2>Arcade</h2>
      <div id="arcade-content" class="grid"></div>
    </section>

    <section>
      <h2>Helpful Links</h2>
      <div class="filters" id="link-filters"></div>
      <div id="links" class="grid"><p class="muted">Loading...</p></div>
    </section>
  </main>

  <footer><p class="muted center">© 2026 @family.</p></footer>

  <div id="modal" class="modal hidden">
    <div class="modal-box">
      <button class="modal-close">&times;</button>
      <h3 id="modal-title" class="gold">Intro</h3>
      <iframe id="modal-frame" src="" allow="autoplay"></iframe>
    </div>
  </div>

  <script src="script.js"></script>
</body>
</html>
